<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pitched</title>
  <meta name="description" content="The dating app where you don't sell yourself." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <!-- Inter from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #ffffff;
      --text-primary: #101828;
      --text-secondary: #475467;
      --text-placeholder: #b3bac2;
      --accent-pitched: #FF9C85;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .logo {
      font-size: clamp(48px, 12vw, 96px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 48px;
    }

    .coming-soon {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-placeholder);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-placeholder);
    }

    footer a {
      color: var(--text-placeholder);
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">PITCHED</div>
    <div class="tagline">The dating app where you don't sell yourself.</div>
    <div class="coming-soon">Coming soon</div>
  </main>

  <footer>
    <a href="/legal/terms">Terms</a>
    ·
    <a href="/legal/privacy">Privacy</a>
    ·
    <a href="mailto:hello@pitched.dating">Contact</a>
  </footer>
</body>
</html>
