<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You've been invited — Pitched</title>
  <meta name="description" content="Someone invited you to be their wingman on Pitched." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <!-- Apple Smart App Banner: shows "Open in App" if app is installed.
       Update with your real Apple App Store ID once published. -->
  <meta name="apple-itunes-app" content="app-id=PLACEHOLDER_APP_STORE_ID" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --text-primary: #101828;
      --text-strong: #323131;
      --text-placeholder: #b3bac2;
      --border: #eaecf0;
      --accent-pitched: #FF9C85;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 64px;
    }

    .headline {
      font-size: clamp(28px, 6vw, 36px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-strong);
      line-height: 1.5;
      margin-bottom: 48px;
      max-width: 360px;
    }

    .stores {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .store-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 9999px;
      background: var(--text-primary);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 800;
      transition: opacity 0.15s ease;
    }

    .store-button:hover {
      opacity: 0.9;
    }

    .store-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .helper {
      margin-top: 32px;
      font-size: 13px;
      color: var(--text-placeholder);
      max-width: 320px;
    }

    footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-placeholder);
    }

    footer a {
      color: var(--text-placeholder);
      text-decoration: none;
      margin: 0 8px;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">PITCHED</div>

    <h1 class="headline">You've been invited</h1>
    <p class="subtitle">
      A friend wants you as their wingman on Pitched.
      Download the app to accept the invite.
    </p>

    <div class="stores">
      <a class="store-button" href="https://apps.apple.com/app/idPLACEHOLDER" rel="noopener">
        <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        <span>App Store</span>
      </a>
      <a class="store-button" href="https://play.google.com/store/apps/details?id=app.pitched.pitched" rel="noopener">
        <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198l2.807 1.626a1 1 0 010 1.73l-2.808 1.626L15.119 12l2.579-2.491zM5.864 2.658L16.802 8.99l-2.303 2.303-8.635-8.635z"/>
        </svg>
        <span>Google Play</span>
      </a>
    </div>

    <p class="helper">
      Already have the app? It should have opened automatically.
      If not, make sure you're tapping the link from a recent message.
    </p>
  </main>

  <footer>
    <a href="/">Home</a>
    ·
    <a href="/legal/terms">Terms</a>
    ·
    <a href="/legal/privacy">Privacy</a>
  </footer>
</body>
</html>
